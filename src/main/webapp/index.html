<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index</title>
    <link
      rel="stylesheet"
      href="${pageContext.request.contextPath}/resources/css/style.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Localhost Projects</h1>
      </header>
      <div id="link-div"></div>
    </div>

    <script>
      const list = [
        { name: "Unit Converter", url: "http://localhost:8080/hw03/convert" },
        { name: "Image List", url: "http://localhost:8080/hw02/imageList" },
        {
          name: "World Time CN",
          url: "http://localhost:8080/hw03/worldtime/ui",
        },
        { name: "Data Form", url: "http://localhost:8080/03/data-form.jsp" },
        { name: "Echo Service", url: "http://localhost:8080/03/echo" },
        {
          name: "Identify",
          url: "http://localhost:8080/03/resourceIdentify.jsp",
        },
        {
          name: "Read Resource",
          url: "http://localhost:8080/03/resourceRead.jsp",
        },
        {
          name: "Response Desc",
          url: "http://localhost:8080/04/responseDesc.jsp",
        },
        { name: "유닛 변환기 (v4)", url: "http://localhost:8080/hw04/convert" },
      ];

      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("link-div");

        list.forEach((item) => {
          const link = document.createElement("a");
          link.href = item.url;
          link.target = "_blank";
          link.className = "link-item";

          link.innerHTML = `
            <span class="link-name">${item.name}</span>
            <span class="link-url">${item.url}</span>
          `;

          container.appendChild(link);
        });
      });
    </script>
  </body>
</html>
