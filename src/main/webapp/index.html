<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index</title>
    <link rel="stylesheet" href="./resources/css/index.css" />
    <link rel="stylesheet" href="./resources/css/fonts.css" />
  </head>
  <body>
    <div class="container">
      <div id="imageDiv">
        <img src="./resources/images/icon_5.png" alt="Icon" />
        <img src="./resources/images/icon_1.gif" alt="Icon" />
      </div>
      <header class="header">
        <h1>List</h1>
      </header>
      <div id="link-div"></div>
    </div>

    <script>
      const list = [
        { name: "Unit Converter", url: "http://localhost:8080/hw03/convert" },
        { name: "Image List", url: "http://localhost:8080/hw02/imageList" },
        {
          name: "World Time CN",
          url: "http://localhost:8080/hw03/worldtime/ui",
        },
        { name: "Data Form", url: "http://localhost:8080/03/data-form.jsp" },
        { name: "Echo Service", url: "http://localhost:8080/03/echo" },
        {
          name: "Identify",
          url: "http://localhost:8080/03/resourceIdentify.jsp",
          desc: "URL / URI, 자원의 접근 경로에 따른 분류",
        },

        {
          name: "Response Desc",
          url: "http://localhost:8080/04/responseDesc.jsp",
          desc: "HttpServletResponse",
        },
        { name: "유닛 변환기", url: "http://localhost:8080/hw04/convert" },
        {
          url: "http://localhost:8080/hw06/calc",
          name: "Calculator",
          desc: "사칙연산",
        },

        {
          url: "http://localhost:8080/resources/html/hw06/iframe-view.html",
          name: "/resources/html/hw06/iframe-view.html",
        },
        {
          url: "http://localhost:8080/hw05/exchange",
          name: "Exchange",
          desc: "환율 계산기",
          date: "2026-03-30",
        },
      ];

      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("link-div");

        list.reverse().forEach((item) => {
          const link = document.createElement("a");
          const span = document.createElement("span");
          link.href = item.url;
          link.target = "_blank";
          link.className = "link-item";

          link.innerHTML = `
            <span class="link-name">
              ${item.name} 
              <span class="link-desc">${item.desc || ""}</span>
              <span class="link-desc">${item.date || ""}</span>

            </span>
            <span class="link-url">${item.url}</span>
          `;

          container.appendChild(link);
        });
      });
    </script>
  </body>
</html>
